# Client config: UK Online Retail export
# column_map: raw CSV header -> standard internal field name.
# Every key listed here must exist as a column in the raw CSV.

# This export contains raw non-UTF-8 bytes (e.g. a pound sign), so it must be
# read as latin1 -- confirmed it fails to decode as UTF-8. Explicit here
# because the pipeline default is utf-8-sig, which would corrupt this file.
encoding: "latin1"

column_map:
  InvoiceNo: order_id
  InvoiceDate: date
  CustomerID: customer_id
  Country: country
  StockCode: product_code
  Description: product_desc
  Quantity: quantity
  UnitPrice: unit_price

# strptime format for the raw date column (this export uses month/day/year).
date_format: "%m/%d/%Y %H:%M"

# order_id values starting with this prefix are cancellations and are dropped.
cancellation_prefix: "C"

# Exact product_desc values (case-insensitive) to drop entirely -- these are
# bookkeeping/adjustment line items in the raw export, not real product sales.
excluded_descriptions:
  - "Manual"
  - "Adjust bad debt"
  - "AMAZON FEE"

# Ordered keyword -> category rules. First match wins. Matching is
# case-insensitive, word-boundary aware, and tolerant of simple plurals
# (a keyword "card" also matches "cards") -- see pipeline/transform.py.
# Anything unmatched becomes "Uncategorized". Edit freely per client;
# the pipeline code never changes.
category_rules:
  - category: "Christmas & Seasonal"
    keywords: ["christmas", "xmas", "easter", "halloween", "advent", "sleigh"]
  - category: "Hot Water Bottles & Warmers"
    keywords: ["hot water bottle", "hottie", "hand warmer"]
  - category: "Bunting & Party"
    keywords: ["bunting", "party", "cracker", "confetti", "balloon", "parasol", "garland"]
  - category: "Signage & Boards"
    keywords: ["sign", "chalkboard", "memo board", "board", "doormat"]
  - category: "Storage & Furniture"
    keywords: ["cabinet", "drawer", "storage box", "coat rack", "hook", "chest", "shelf",
               "book box", "trinket box", "hanger", "button box"]
  - category: "Home Decor"
    keywords: ["light", "candle", "candleholder", "chocolatecandle", "holder", "lantern", "frame",
               "mirror", "clock", "vase", "ornament", "decoration", "wicker", "trellis", "doorstop",
               "owl", "photo", "magnet"]
  - category: "Kitchen & Dining"
    keywords: ["mug", "cup", "plate", "bowl", "tin", "jar", "kitchen", "tea", "coffee", "cake", "baking",
               "lunch box", "pantry", "jam making", "snack box", "bread bin", "recipe box", "recipe book",
               "cookie cutter", "teacup", "teapot", "cakestand", "jug", "napkin", "cutlery",
               "sugar dispenser", "washing up", "picnic basket", "doily", "doilies", "apron",
               "food container", "measuring spoon", "oven glove", "crate", "place setting",
               "placemat", "coaster", "bottle opener", "frying pan"]
  - category: "Bags & Accessories"
    keywords: ["bag", "purse", "wallet", "umbrella", "scarf", "jewel", "jewellery box", "jewelry box",
               "necklace", "bracelet", "shopper", "key fob", "fan", "case", "poncho", "hair clip", "ring"]
  - category: "Stationery & Craft"
    keywords: ["card", "notebook", "note book", "pen", "pencil", "craft", "sticker", "paper",
               "gift wrap", "wrap", "ribbon", "stationery", "crayon", "eraser", "ruler",
               "exercise book", "sewing kit", "sewing box", "paint set", "chalk", "stamp set",
               "writing set", "knitting", "colouring", "gift tag", "modelling clay", "notepad"]
  - category: "Toys & Games"
    keywords: ["toy", "game", "doll", "puzzle", "ball", "spinning top", "domino", "skittle", "glider",
               "feltcraft", "bingo", "naughts", "snakes & ladders", "piggy bank", "playhouse", "babushka",
               "building block", "harmonica", "skipping rope", "drawing slate"]
  - category: "Garden & Outdoor"
    keywords: ["garden", "outdoor", "plant", "pot", "watering", "gardener"]
  - category: "Bath & Linen"
    keywords: ["towel", "bath", "soap", "blanket", "cushion", "linen", "tissue", "washroom",
               "clothes peg", "bib"]
  - category: "Beauty & Personal Care"
    keywords: ["lip gloss", "perfume bottle"]
  - category: "Shipping & Fees"
